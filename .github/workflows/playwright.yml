# test change
name: Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Check HR site connectivity
        run: curl -I https://hr.app.bombayworks.org/login/

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Leave test only
        run: npx playwright test tests/Leave.spec.ts

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
         name: playwright-report
         path: playwright-report/
         retention-days: 30